<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Concept 04: Monogram S -->
  <!-- Large sage serif "S", with very faint 3x3 grid overlay -->
  <rect width="1024" height="1024" fill="#FAF8F3"/>
  <!-- Faint grid behind (5% opacity sage) -->
  <g stroke="#5C7A4F" stroke-width="8" fill="none" opacity="0.05">
    <rect x="212" y="212" width="600" height="600"/>
    <line x1="412" y1="212" x2="412" y2="812"/>
    <line x1="612" y1="212" x2="612" y2="812"/>
    <line x1="212" y1="412" x2="812" y2="412"/>
    <line x1="212" y1="612" x2="812" y2="612"/>
  </g>
  <!-- Serif S: ~700pt tall, centered. Use system serif font (Georgia/Times). -->
  <text x="512" y="512"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="820"
        font-weight="400"
        fill="#5C7A4F"
        text-anchor="middle"
        dominant-baseline="central">S</text>
</svg>
