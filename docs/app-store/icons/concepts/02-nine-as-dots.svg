<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Concept 02: Nine as Dots -->
  <!-- 3x3 array of sage circles, dot diameter 140, spacing 80 -->
