name: "数独 — デイリーと練習"
subtitle: "iPhoneとMacの静かな論理"
promotional_text: |
  毎日UTC 00:00に3つの新しいパズル（簡単・中級・上級）。iPhoneとMacで同じiCloudアカウントなら進行状況を自動で引き継ぐ。広告なし、追跡なし、追加アカウント不要。
description: |
  数独は、思考のための時間。にぎやかさは要らない。

  毎日UTC 00:00に3つのパズルが届く。簡単、中級、上級。世界中のプレイヤーが同じ問題に挑む。タイムはあなたのもの、リーダーボードがそれを世界と比べてみせる。

  競うより練習したい日もある。Practiceモードに切り替えれば、難易度ごとにランダムな盤面が手に入る。タイマーのプレッシャーなし、スコア送信なし、誰にも何にもとらわれない。

  収録内容

  • Dailyモード：3難易度の毎日課題、UTC 00:00でリセットされるリーダーボード、1問1スコアのフェアな計測。
  • Practiceモード：難易度別にランダム生成、計測なし、ランクなし。
  • メモ機能：1マスに最大9個の候補。紙にエンピツで書く感覚そのまま。
  • Undo / Redo：最大20手まで戻せる。
  • リアルタイム誤入力ハイライト：間違いはその場で赤くなる。最後まで気づかない事故が起きない。
  • いつでも中断、いつでも再開：自動セーブ、ホームから1タップで続き。
  • Game Center：3つのデイリーリーダーボードと8つの実績。合計500ポイント。

  真のクロスプラットフォーム

  ひとつのコードベース、二つのプラットフォーム。Mac版はSwiftUIで書かれた本物のMacアプリ。iPad-on-MacでもCatalystでもない。ウィンドウのリサイズ、キーボード操作（矢印キー、1〜9、delete、⌘Z、⌘⇧Z）、Macネイティブのメニューバー。Macユーザーが当然と思う動きで動く。手元のデバイスで続きから。

  プライバシーについて

  個人情報は集めない。サードパーティのアナリティクスSDKも広告SDKも入っていない。セーブデータは自分のiCloud Private Databaseの中にある。あなたには見えて、こちらには見えない。Game Centerのスコア送信はAppleが処理する。それだけ。

  7言語対応

  繁体中文、英語、日本語、簡体中文、スペイン語、タイ語、韓国語。UI、Game Centerのタイトル、ストア説明文すべて。

  アクセシビリティ

  Dynamic Type、VoiceOver完全対応、ライト／ダーク両モード。長時間のセッションに合わせて調整したセージグリーンと暖かい紙色。

  iOS 26 / macOS 26 以降が必要。
