# license_plist.yml â€” source of truth for App Store Acknowledgements page.
#
# Generated by `mise exec ubi:mono0926/LicensePlist -- license-plist`
# from Xcode Cloud `ci_scripts/ci_post_clone.sh` (see docs/foundations.md Â§4).
# Generated output lives at `App/Sudoku/Resources/Settings.bundle/` and is .gitignore'd
# (CI regenerates on every build). Settings.bundle is iOS-standard:
# surfaces under iOS Settings.app â†’ <App name> â†’ Acknowledgements.
#
# Schema reference: https://github.com/mono0926/LicensePlist#configuration
# YAML keys are camelCase nested under `options:`, EXCEPT `exclude:`/`rename:`/
# `github:`/`manual:`, which are top-level siblings of `options:` (confirmed
# against the upstream README Â§Excludes â€” the config-dir `.build` LicensePlist
# checkout has no bundled source/README, so this one lookup used the GitHub
# README directly; verified empirically below by regenerating and diffing output).

# Test-target-only transitive deps (pulled in via swift-snapshot-testing's test
# targets) that never ship in the app binary â€” exclude by package `name` so the
# Acknowledgements page only discloses what's actually shipped (#747). Each
# entry is a dictionary (README Â§Excludes: bare-string form is NOT supported by
# this key, only `name`/`source`/`owner`/`licenseType`).
exclude:
  - name: swift-custom-dump
  - name: swift-snapshot-testing
  - name: swift-syntax
  - name: xctest-dynamic-overlay

options:
  # SwiftPM packages to scan. Both must be listed: AppMonetizationKit pulls
  # AdMob + UMP (third-party SDKs that ship in the app bundle and require
  # disclosure); SudokuKit currently has no third-party deps but is listed for
  # forward-compatibility.
  # NB: like outputPath below, packagePaths resolve relative to THIS config
  # file's directory (App/Sudoku/), so they must climb to the repo root with
  # `../../` (#721). With repo-root-relative paths LicensePlist silently found
  # nothing here and only produced a full list when `Game.xcworkspace` (its
  # `*.xcworkspace` CWD fallback) happened to exist from a prior tuist generate.
  packagePaths:
    - ../../Packages/AppMonetizationKit/Package.swift
    - ../../Packages/SudokuKit/Package.swift

  # Settings.bundle landing path inside the App target's resources.
  # NB: LicensePlist resolves outputPath relative to THIS config file's directory
  # (App/Sudoku/), not the repo root â€” so it's `Resources/Settings.bundle`, not
  # `App/Sudoku/Resources/...` (that would double the path and land in
  # App/Sudoku/App/Sudoku/Resources/, which Tuist's resource glob never picks up).
  # Regression introduced when #393 co-located the config under App/.
  outputPath: Resources/Settings.bundle

  # Overwrite stale entries on each CI run.
  force: true

  # Annotate version numbers on the Acknowledgements page.
  addVersionNumbers: true

  # CI runs headless â€” do not `open` the output directory on completion.
  suppressOpeningDirectory: true
