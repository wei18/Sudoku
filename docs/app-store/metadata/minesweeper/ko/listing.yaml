locale: ko
name: "지뢰찾기 — 클래식"
subtitle: "iPhone과 Mac을 위한 깔끔한 논리"
promotional_text: |
  익숙한 논리 게임을 차분하게. 초급, 중급, 전문가. 첫 탭은 언제나 안전해요. 우리는 프로파일을 만들지 않아요. 광고는 당신이 허락할 때만 맞춤화되고, 거부하거나 아예 없앨 수 있어요.
description: |
  지뢰찾기, 소음이 아니라 사고를 위해 만들었어요.

  이미 아는 규칙이에요. 칸을 열고, 숫자를 읽고, 지뢰에 깃발을 꽂고, 지뢰를 밟지 않으면서 판을 다 비우면 돼요. 클래식한 세 가지 난이도 — 초급(9×9, 지뢰 10), 중급(16×16, 지뢰 40), 전문가(16×30, 지뢰 99)예요.

  첫 탭은 언제나 안전해요

  지뢰는 첫 칸을 연 뒤에 배치돼서, 처음 누른 칸과 그 주변은 절대 지뢰가 될 수 없어요. 첫 수에 지는 일은 이제 없어요. 각 판은 난이도와 시드로 완전히 결정되니, 같은 판을 다시 하면 똑같이 전개돼요.

  무엇이 들어 있나요

  • 클래식한 세 가지 난이도: 초급, 중급, 전문가.
  • 첫 탭 안전: 첫 수로는 지지 않아요.
  • 탭으로 열고, 길게 눌러 깃발(Mac에서는 오른쪽 클릭 또는 control 클릭).
  • Daily 모드: 매일 세 가지 난이도, UTC 00:00 리셋 데일리 리더보드.
  • Game Center 데일리 리더보드 세 개(초급/중급/전문가). 로그인 선택.

  진짜 크로스 플랫폼

  하나의 코드베이스, 두 개의 플랫폼. Mac 버전은 진짜 SwiftUI Mac 앱이에요 — iPad-on-Mac도 Catalyst도 아니에요. 창 크기 조절과 오른쪽 클릭 깃발이 Mac 사용자가 기대하는 대로 동작해요. 손이 닿는 기기에서 하면 돼요.

  쉬운 말로 풀어쓴 개인정보

  자체 분석도, CRM도, 자체 백엔드도 없어요 — 우리 쪽에서 당신의 프로파일을 만들지 않아요. 데이터는 본인의 iCloud 개인 데이터베이스에 있어요 — 보이는 건 당신뿐이에요. 서드파티 SDK는 Google의 배너 광고 라이브러리 하나뿐인데, 광고를 관련성 있게 유지하려고 광고 식별자를 쓸 수 있어요. 그것도 당신이 허락할 때만요. 거부해도 광고는 계속 나오고(맞춤도가 낮아질 뿐), 한 번의 인앱 구매로 배너를 영구히 없앨 수도 있어요. 이 식별자는 광고 관련성을 위한 것이지, 당신의 개인 프로파일을 만들기 위한 게 아니에요.

  광고 제거

  비소모성 일회성 구매로 모든 배너를 영구히 없애요. 가족 공유 지원.

  일곱 가지 언어

  영어, 번체 중국어, 일본어, 간체 중국어, 스페인어, 태국어, 한국어.

  접근성

  Dynamic Type, VoiceOver, 라이트 및 다크 모드.

  iOS 26 또는 macOS 26 이상이 필요해요.
