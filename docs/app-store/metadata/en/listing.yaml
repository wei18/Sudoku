whats_new: |
  Version 1.0 — first public release.

  • Daily mode: three new puzzles at UTC 00:00 every day, with their own recurring leaderboards.
  • Practice mode: random boards by difficulty, no clock and no scores.
  • Cross-device sync: saves and statistics flow between iPhone and Mac via your iCloud Private Database.
  • Game Center: three daily leaderboards and eight achievements (500 points total).
  • Seven languages on day one: English, Traditional Chinese, Japanese, Simplified Chinese, Spanish, Thai, Korean.
  • Mac native build, not Catalyst — full keyboard support and menu bar items.
  • No ads, no tracking, no third-party SDKs.

  Thank you for trying it. Issues and feature requests are welcome at the support link.
