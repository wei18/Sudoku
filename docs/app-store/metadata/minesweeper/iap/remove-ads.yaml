    description: "지뢰찾기의 배너 광고를 영구히 제거해요."

# ── App Review notes ──────────────────────────────────────────────────────
review_notes: |
  This is a non-consumable IAP that permanently removes banner ads in the
  Minesweeper app.

  How to test:
  1. Launch the app. A banner ad placeholder appears at the bottom of the
     game surface.
  2. Open Settings → Remove Ads.
  3. Confirm the StoreKit purchase sheet with a sandbox tester account.
  4. After successful purchase, the banner disappears across all screens. A
     "Restore Purchases" row remains in Settings for new-device restore.

  No external services other than Apple's StoreKit are involved.

# ── Pricing schedule ─────────────────────────────────────────────────────
pricing:
  tier: "USD 2.99"
  family_sharing: true
  cleared_for_sale: true
  all_countries: true

# ── Screenshot ───────────────────────────────────────────────────────────
# App Review requires one Review Screenshot per IAP showing where the product
# is offered in-app. User-owned: run the app, capture Settings with the
# "Remove Ads" row visible. Save to the path below (git-tracked once it lands).
screenshot:
  required_size: "1290 × 2796 (iPhone 6.9\") or 1242 × 2688 (iPhone 6.5\")"
  expected_path: docs/app-store/metadata/minesweeper/iap/remove-ads/review-screenshot.png
  status: pending-built-app
