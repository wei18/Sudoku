whats_new: |
  버전 1.0

  첫 출시예요.

  • 클래식 지뢰찾기: 초급, 중급, 전문가. 첫 탭은 언제나 안전해요.
  • Daily 모드: 매일 UTC 00:00에 세 문제, Game Center 리더보드 포함.
  • 광고 제거: 비소모성 일회성 구매로 배너를 영구히 없애요. 가족 공유 지원.
  • iCloud 동기화: 데이터는 본인의 iCloud 개인 데이터베이스에 있어요.
  • 일곱 가지 언어: 영어, 번체 중국어, 일본어, 간체 중국어, 스페인어, 태국어, 한국어.
  • Mac 네이티브, Catalyst 아니에요.

  플레이해 주셔서 고마워요. 문제나 제안은 지원 링크로 보내 주세요.
