locale: ko
name: "스도쿠 — 데일리와 연습"
subtitle: "iPhone과 Mac을 위한 조용한 논리"
promotional_text: |
  매일 UTC 00:00에 새 퍼즐 세 개(쉬움/보통/어려움). iPhone과 Mac이 같은 iCloud 계정이면 진행 상황이 자동으로 이어져요. 광고 없고, 추적 없고, 별도 계정도 없어요.
description: |
  스도쿠는 생각을 위한 시간이에요. 시끄러움은 필요 없어요.

  매일 UTC 00:00에 퍼즐 세 개가 도착해요. 쉬움, 보통, 어려움. 전 세계 플레이어가 같은 문제를 풀어요. 시간은 당신의 것이고, 리더보드가 다른 사람들과 비교해 어떤지 알려줘요.

  경쟁보다 연습이 하고 싶을 때는 Practice 모드로 전환해요. 원할 때 무작위 보드가 나오고, 시간 압박도 없고, 점수도 제출하지 않고, 증명해야 할 것도 없어요.

  담긴 내용

  • Daily 모드: 매일 세 가지 난이도, UTC 00:00에 리셋되는 데일리 리더보드, 같은 퍼즐은 한 번만 점수에 반영돼요.
  • Practice 모드: 난이도별 무제한 무작위 보드. 점수 없고 순위 없어요.
  • 연필 메모: 한 칸에 후보 숫자 아홉 개까지. 종이에 적던 방식 그대로예요.
  • 되돌리기와 다시 실행: 최대 스무 단계까지 돌아갈 수 있어요.
  • 실시간 오류 표시: 잘못 입력하면 바로 빨간 테두리가 떠요. 끝에 가서야 알게 되는 일이 없어요.
  • 언제든 일시정지, 언제든 이어 하기: 자동 저장돼요. 홈 화면에서 한 번 탭으로 이어 해요.
  • Game Center: 데일리 리더보드 세 개와 도전 과제 여덟 개, 합쳐서 500점.

  진짜 크로스 플랫폼

  하나의 코드베이스, 두 개의 플랫폼. Mac 버전은 진짜 SwiftUI Mac 앱이에요 — iPad on Mac도 아니고 Catalyst도 아니에요. 창 크기 조절, 키보드 조작(화살표, 1–9, delete, ⌘Z, ⌘⇧Z), Mac 네이티브 메뉴 막대. Mac 사용자가 기대하는 방식 그대로 동작해요. 손에 잡히는 기기에서 이어서 하면 돼요.

  개인정보, 솔직하게

  개인정보는 수집하지 않아요. 서드파티 분석이나 광고 SDK도 들어 있지 않아요. 저장 데이터는 당신의 iCloud Private Database 안에 있어요 — 당신만 볼 수 있고, 우리는 볼 수 없어요. Game Center 점수는 Apple이 처리해요. 목록은 여기까지가 전부예요.

  일곱 가지 언어

  번체 중국어, 영어, 일본어, 간체 중국어, 스페인어, 태국어, 한국어 — 인터페이스, Game Center 제목, 스토어 설명까지 모두 포함이에요.

  접근성

  Dynamic Type, VoiceOver 전체 지원, 라이트/다크 모드 전환. 오래 플레이하기 좋게 조정한 세이지 그린과 따뜻한 종이 톤 배경이에요.

  iOS 26 또는 macOS 26 이상이 필요해요.
