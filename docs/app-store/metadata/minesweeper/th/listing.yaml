locale: th-TH
name: "เก็บกู้ระเบิด — คลาสสิก"
subtitle: "ตรรกะสะอาดบน iPhone และ Mac"
promotional_text: |
  เกมตรรกะคลาสสิกในแบบเงียบสงบ ระดับเริ่มต้น กลาง และผู้เชี่ยวชาญ การแตะครั้งแรกปลอดภัยเสมอ เราไม่สร้างโปรไฟล์ของคุณ โฆษณาปรับให้ตรงเฉพาะเมื่อคุณอนุญาต ปฏิเสธหรือลบออกก็ได้
description: |
  เก็บกู้ระเบิด ทำมาเพื่อการคิด ไม่ใช่เสียงรบกวน

  กติกาที่คุณรู้อยู่แล้ว เปิดช่อง อ่านตัวเลข ปักธงบนระเบิด แล้วเคลียร์กระดานให้หมดโดยไม่เหยียบระเบิด สามระดับคลาสสิก ระดับเริ่มต้น (9×9 ระเบิด 10) ระดับกลาง (16×16 ระเบิด 40) และผู้เชี่ยวชาญ (16×30 ระเบิด 99)

  การแตะครั้งแรกปลอดภัยเสมอ

  ระเบิดจะถูกวางหลังจากที่คุณเปิดช่องครั้งแรก ดังนั้นการแตะเปิดครั้งแรกและช่องรอบ ๆ จะไม่มีทางเป็นระเบิด ไม่ต้องแพ้ตั้งแต่ตาแรกอีกต่อไป กระดานแต่ละชุดถูกกำหนดด้วยระดับความยากและซีดอย่างสมบูรณ์ เล่นกระดานเดิมซ้ำก็ได้ผลเหมือนเดิม

  มีอะไรบ้าง

  • สามระดับคลาสสิก ระดับเริ่มต้น กลาง ผู้เชี่ยวชาญ
  • ความปลอดภัยในการแตะครั้งแรก ตาเปิดแรกไม่มีทางแพ้
  • แตะเพื่อเปิด กดค้างเพื่อปักธง (คลิกขวาหรือ control-คลิกบน Mac)
  • ชุดกระดานประจำวันให้เล่น

  ข้ามแพลตฟอร์มอย่างแท้จริง

  โค้ดชุดเดียว สองแพลตฟอร์ม เวอร์ชัน Mac เป็นแอป Mac SwiftUI ของจริง ไม่ใช่ iPad บน Mac และไม่ใช่ Catalyst การปรับขนาดหน้าต่างและการปักธงด้วยคลิกขวาทำงานตามที่ผู้ใช้ Mac คาดหวัง เล่นบนเครื่องที่อยู่ใกล้มือ

  ความเป็นส่วนตัว พูดกันตรง ๆ

  ไม่มี analytics ของเราเอง ไม่มี CRM ไม่มีเซิร์ฟเวอร์ของเราเอง ฝั่งเราไม่สร้างโปรไฟล์ของคุณ ข้อมูลของคุณอยู่ในฐานข้อมูลส่วนตัว iCloud ของคุณเอง คุณเห็นได้ เราไม่เห็น SDK ของบุคคลที่สามมีเพียงไลบรารีแบนเนอร์โฆษณาของ Google ซึ่งอาจใช้ตัวระบุโฆษณาเพื่อให้โฆษณายังตรงกับคุณ และเฉพาะเมื่อคุณอนุญาตเท่านั้น คุณปฏิเสธได้ (โฆษณายังแสดงอยู่ เพียงแต่ตรงกับคุณน้อยลง) หรือลบแบนเนอร์ออกถาวรด้วยการซื้อในแอปครั้งเดียว ตัวระบุนี้มีไว้เพื่อความตรงของโฆษณา ไม่ใช่เพื่อสร้างโปรไฟล์ส่วนตัวของคุณ

  ลบโฆษณา

  การซื้อครั้งเดียวแบบไม่สิ้นเปลือง ลบแบนเนอร์ทุกที่อย่างถาวร รองรับ Family Sharing

  เจ็ดภาษา

  อังกฤษ จีนตัวเต็ม ญี่ปุ่น จีนตัวย่อ สเปน ไทย และเกาหลี

  การช่วยการเข้าถึง

  Dynamic Type, VoiceOver, โหมดสว่างและมืด

  ต้องใช้ iOS 26 หรือ macOS 26 ขึ้นไป
