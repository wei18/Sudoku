whats_new: |
  버전 2.5

  스도쿠는 계속 무료예요. 이번 버전은 선택적 배너 광고와 그것을 끄는 방법을 더했어요.

  • 광고 제거: 한 번의 구매로 모든 배너를 영구히 없애요. 가족 공유 지원.
  • 구매 복원: 이미 구매했나요? 어느 기기에서든 한 번 탭으로 복원해요.
  • 무료 버전을 유지하면 광고는 비개인화돼요 — 추적 없고, 개인정보는 그대로예요.
  • 데일리 리더보드와 저장·기록의 iCloud 동기화는 예전과 같아요.

  플레이해 줘서 고마워요. 문제와 의견은 지원 링크로 알려주세요.
