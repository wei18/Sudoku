# App Store Connect IAP metadata — Minesweeper Remove Ads
#
# Product ID: com.wei18.minesweeper.iap.remove_ads
# Apple ID:   TBD (assigned when the MS app record is created in ASC)
# Type:       Non-Consumable (one-time purchase)
# Price:      USD 2.99 tier (mirrors Sudoku)
# Family Sharing: enabled
#
# Mirrors docs/app-store/metadata/sudoku/iap/remove-ads.yaml (the Sudoku IAP).
# Same ASC field limits: name ≤ 30, description ≤ 45.
#
# Sources:
#   - en, zh-Hant: author-written.
#   - ja, zh-Hans, es, th, ko: AI-translated per `ai-translated-localization`
#     (no honorific particles in ja; no ครับ/ค่ะ in th; 해요체 in ko;
#     neutral LATAM Spanish; zh-Hans term-level translation).
#
# Config link: `Config.iaps` in ASCRegister already carries the MS product
# (`com.wei18.minesweeper.iap.remove_ads`); the localization name/description
# strings come from `Minesweeper/Resources/Localizable.xcstrings` keys
# `iap.minesweeper.remove_ads.name` / `.description` (see IAPProduct.shortId
# mapping). This YAML is the human-readable source-of-truth for the same copy.

product_id: com.wei18.minesweeper.iap.remove_ads
reference_name: Remove Ads

