locale: ja
name: "マインスイーパ — クラシック"
subtitle: "iPhoneとMacの静かな論理"
promotional_text: |-
  おなじみの論理ゲームを、静かに。初級・中級・上級の3段階。最初のタップは必ず安全。自社のプロファイリングなし。広告はあなたの許可があるときだけ関連性を保ち、拒否も、1回の購入で消すこともできます。
description: |-
  マインスイーパを、思考のために。雑音のためではなく。

  ルールはご存じのとおり。マスを開き、数字を読み、地雷に旗を立て、地雷を踏まずに盤面を空にする。クラシックな3段階——初級（9×9、地雷10）、中級（16×16、地雷40）、上級（16×30、地雷99）。

  最初のタップは必ず安全

  地雷は最初にマスを開いたあとに配置されるので、開始の1手目とその周囲が地雷になることはない。初手で負けることはもうない。盤面は難易度とシードで完全に決まり、同じ盤を再プレイすれば同じ展開になる。

  内容

  • クラシックな3段階：初級・中級・上級。
  • 初手の安全：最初のタップで負けない。
  • タップで開く、長押しで旗（Macでは右クリックまたはcontrolクリック）。
  • デイリーモード：毎日3難度、UTC 00:00リセットのリーダーボード付き。
  • Game Centerデイリーリーダーボード3つ（初級・中級・上級）。サインイン任意。

  真のクロスプラットフォーム

  ひとつのコードベース、ふたつのプラットフォーム。Mac版は本物のSwiftUI Macアプリ——iPad-on-MacでもCatalystでもない。ウィンドウのリサイズも右クリックでの旗立ても、Macの作法どおりに動く。手元にあるデバイスでプレイできる。

  プライバシーについて

  自社のアナリティクスもCRMもバックエンドもない——こちら側があなたのプロファイルを作ることはない。データは自分のiCloudプライベートデータベースにある——見えるのは本人だけ。サードパーティのSDKはGoogleのバナー広告ライブラリのみ。広告の関連性を保つために広告識別子を使うことがあるが、それもあなたの許可があるときだけ。拒否すれば広告は表示されたまま（ただし関連性は下がる）、または1回のアプリ内課金でバナーを完全に削除できる。この識別子は広告の関連性のためであって、あなたの個人プロファイルを作るためではない。

  広告を非表示

  非消耗型の1回購入で、すべてのバナーを永久に削除。ファミリー共有対応。

  7言語対応

  日本語、英語、繁体字中国語、簡体字中国語、スペイン語、タイ語、韓国語。

  アクセシビリティ

  Dynamic Type、VoiceOver、ライト／ダークモード対応。

  iOS 26またはmacOS 26以降が必要。
