# PR title lint — enforces Conventional Commits format on the pull request title.
# Phase 1 advisory: not yet a required status check.
# When user enables branch protection on `main`, add this job to required checks.

name: PR Metadata

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  pr-title:
    name: Validate PR title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Conventional Commits types accepted in this repo (matches recent
          # merged commit history: feat, refactor, fix, docs, chore, ci, ...).
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            build
            ci
            perf
            style
            revert
          # Scopes are optional and unrestricted (e.g. `feat(monetization):`,
          # `refactor(types):`); the action allows any scope by default.
          requireScope: false
          # Subject must start lowercase, per recent commit style
          # (e.g. `feat(admob): wire real BannerView load`).
          subjectPattern: ^[a-z].+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Subject should start with a
            lowercase letter (e.g. "feat(scope): add foo bar").
