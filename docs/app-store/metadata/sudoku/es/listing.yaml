locale: es
name: "Sudoku — Diario y Práctica"
subtitle: "Lógica serena en iPhone y Mac"
promotional_text: |-
  Tres puzles nuevos cada día a las 00:00 UTC. Retoma la partida entre iPhone y Mac. No te perfilamos; los anuncios se adaptan solo con tu permiso: recházalos o quítalos.
description: |-
  Sudoku, hecho para pensar, no para hacer ruido.

  Cada día a las 00:00 UTC llegan tres puzles: Fácil, Medio y Difícil. Los mismos para todos los jugadores del mundo. Tu tiempo es tuyo; el ranking te muestra cómo se compara.

  Si prefieres practicar en lugar de competir, cambia al modo Práctica. Tableros aleatorios cuando los necesites, sin cronómetro encima, sin envío de puntuaciones, sin nada que demostrar.

  Contenido

  • Modo Diario: tres dificultades cada día, rankings recurrentes que se reinician a las 00:00 UTC, una sola puntuación por puzle.
  • Modo Práctica: tableros aleatorios ilimitados por dificultad, sin puntuación ni clasificación.
  • Notas a lápiz: hasta nueve candidatos por celda, igual que en papel.
  • Deshacer y rehacer: hasta veinte pasos atrás.
  • Detección de errores en tiempo real: el dígito incorrecto se marca al instante, no al final.
  • Pausa y reanuda cuando quieras: el guardado es automático y la pantalla principal te ofrece continuar con un toque.
  • Game Center: tres rankings diarios y ocho logros, 500 puntos en total.

  Multiplataforma de verdad

  Una sola base de código, dos plataformas. La versión de Mac es una app SwiftUI nativa real — no es iPad en Mac ni Catalyst. Redimensionar ventanas, navegación con teclado (flechas, 1-9, supr, ⌘Z, ⌘⇧Z) y menús nativos de Mac funcionan como un usuario de Mac espera. Sigue tu partida en el dispositivo que tengas cerca.

  Privacidad, sin rodeos

  No tenemos analítica propia: nada nuestro crea un perfil de ti. Tus partidas viven en tu propia base de datos privada de iCloud — visibles para ti, no para nosotros. Las puntuaciones de Game Center las gestiona Apple. El único SDK de terceros es la biblioteca de banners de Google; puede usar un identificador de publicidad para mantener los anuncios relevantes, y solo con tu permiso. Puedes rechazarlo (los anuncios siguen apareciendo, solo que menos personalizados) — o quitar el banner para siempre con una sola compra dentro de la app. El identificador es para la relevancia de los anuncios, no para crear un perfil personal de ti.

  Quitar anuncios

  Una compra única, no consumible, quita el banner en todas partes, para siempre. Compartir en Familia incluido.

  Siete idiomas

  Chino tradicional, inglés, japonés, chino simplificado, español, tailandés y coreano — interfaz, títulos de Game Center y descripción incluidos.

  Accesibilidad

  Dynamic Type, cobertura completa de VoiceOver, modo claro y oscuro, paleta verde salvia y papel cálido pensada para sesiones largas.

  Requiere iOS 26 o macOS 26.
keywords: "puzle,logica,cerebro,numeros,offline,ipad,mac,lapiz,notas,rompecabezas,sudoko,solver,clasico"
whats_new: |-
  Versión 2.6

  Puzles diarios, rankings, logros — y más serena que nunca.

  • Modo Diario — tres puzles nuevos cada día a las 00:00 UTC (Fácil/Medio/Difícil), los mismos para todos.
  • Game Center — tres rankings diarios y ocho logros, 500 puntos en total. Inicio de sesión opcional.
  • Continúa donde lo dejaste — guardado automático; un toque en la pantalla principal para retomarlo.
  • Quitar anuncios — una compra única, no consumible, elimina el banner en todas partes. Compartir en Familia incluido.

  La privacidad sigue siendo como debe ser: sin analítica propia, los anuncios solo se adaptan con tu permiso — o quítalos.

  Gracias por jugar. Comentarios y errores son bienvenidos en el enlace de soporte.
