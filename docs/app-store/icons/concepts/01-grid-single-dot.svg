<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Concept 01: Grid Single Dot -->
  <!-- Warm paper background, 3x3 grid centered, center cell filled sage -->
  <rect width="1024" height="1024" fill="#FAF8F3"/>
  <g stroke="#5C7A4F" stroke-width="12" fill="none" stroke-linecap="square">
    <!-- 3x3 grid: 600x600 centered at (512,512); cells 200pt each -->
    <!-- Outer square: x=212..812, y=212..812 -->
    <rect x="212" y="212" width="600" height="600"/>
    <!-- Vertical internal lines -->
    <line x1="412" y1="212" x2="412" y2="812"/>
    <line x1="612" y1="212" x2="612" y2="812"/>
    <!-- Horizontal internal lines -->
    <line x1="212" y1="412" x2="812" y2="412"/>
    <line x1="212" y1="612" x2="812" y2="612"/>
  </g>
  <!-- Center cell filled sage (cell x=412..612, y=412..612) -->
  <rect x="412" y="412" width="200" height="200" fill="#5C7A4F"/>
</svg>
