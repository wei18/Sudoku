locale: th
name: "ซูโดกุ — รายวันและฝึก"
subtitle: "ตรรกะเงียบๆ บน iPhone และ Mac"
promotional_text: |
  ปริศนาใหม่สามข้อทุกวันเวลา 00:00 UTC สานต่อเกมระหว่าง iPhone และ Mac โดยอัตโนมัติ ไม่ติดตาม ไม่ต้องสร้างบัญชี มีเพียงแบนเนอร์ที่เลือกได้ ลบออกถาวรด้วยการซื้อครั้งเดียว
description: |
  ซูโดกุที่ออกแบบมาเพื่อการคิด ไม่ใช่เพื่อความวุ่นวาย

  ทุกวันเวลา 00:00 UTC จะมีปริศนาสามข้อมาถึง: ง่าย กลาง ยาก ผู้เล่นทั่วโลกได้ปริศนาชุดเดียวกัน เวลาของคุณเป็นของคุณ กระดานอันดับจะบอกว่าเทียบกับคนอื่นเป็นอย่างไร

  ถ้าอยากฝึกแทนการแข่ง สลับไปโหมด Practice ได้เลย กระดานสุ่มตามต้องการ ไม่มีนาฬิกาจี้ ไม่ส่งคะแนน ไม่มีอะไรต้องพิสูจน์

  เนื้อหา

  • โหมด Daily: ปริศนาสามระดับต่อวัน กระดานอันดับรายวันที่รีเซ็ตเวลา 00:00 UTC ปริศนาเดียวกันคิดคะแนนได้ครั้งเดียว
  • โหมด Practice: กระดานสุ่มไม่จำกัดตามระดับ ไม่คิดคะแนน ไม่จัดอันดับ
  • โน้ตดินสอ: ใส่ตัวเลขที่เป็นไปได้ในช่องเดียวกันได้ถึงเก้าตัว เหมือนเขียนบนกระดาษ
  • Undo และ Redo: ย้อนได้ถึงยี่สิบขั้น
  • ไฮไลต์ข้อผิดพลาดทันที: ใส่ตัวเลขผิดจะเห็นกรอบแดงทันที ไม่ต้องรอจนจบ
  • หยุดและกลับมาเล่นใหม่ได้ทุกเมื่อ: บันทึกอัตโนมัติ หน้าหลักมีปุ่มเล่นต่อในขั้นตอนเดียว
  • Game Center: กระดานอันดับรายวันสามรายการ ความสำเร็จแปดอย่าง รวม 500 คะแนน

  ข้ามแพลตฟอร์มแบบจริงจัง

  โค้ดเดียวกัน สองแพลตฟอร์ม เวอร์ชัน Mac เป็นแอป SwiftUI สำหรับ Mac แท้ ไม่ใช่ iPad บน Mac ไม่ใช่ Catalyst ปรับขนาดหน้าต่าง ใช้คีย์บอร์ดได้เต็มที่ (ลูกศร 1-9 delete ⌘Z ⌘⇧Z) เมนูบาร์แบบ Mac แท้ ทำงานตามที่ผู้ใช้ Mac คาดหวัง เล่นต่อบนเครื่องที่อยู่ใกล้มือ

  เรื่องความเป็นส่วนตัว

  ไม่เก็บข้อมูลส่วนตัว ไม่มี analytics ของเราเอง ไม่ติดตาม เซฟของคุณอยู่ใน iCloud Private Database ของตัวคุณเอง คุณเห็นได้ เราเห็นไม่ได้ คะแนน Game Center ส่งผ่าน Apple SDK ของบุคคลที่สามมีเพียงไลบรารีแบนเนอร์โฆษณาของ Google และคุณลบแบนเนอร์ออกถาวรได้ด้วยการซื้อในแอปครั้งเดียว

  ลบโฆษณา

  การซื้อครั้งเดียวแบบไม่สิ้นเปลือง ลบแบนเนอร์ทุกที่อย่างถาวร รองรับ Family Sharing

  เจ็ดภาษา

  จีนตัวเต็ม อังกฤษ ญี่ปุ่น จีนตัวย่อ สเปน ไทย เกาหลี ครอบคลุมทั้งอินเทอร์เฟซ ชื่อ Game Center และคำอธิบายในสโตร์

  การช่วยเหลือผู้ใช้

  รองรับ Dynamic Type ครอบคลุม VoiceOver ครบ โหมดสว่างและมืด พื้นหลังโทนกระดาษอุ่นกับเซจกรีนที่ปรับให้เหมาะกับการเล่นนานๆ

  ต้องใช้ iOS 26 หรือ macOS 26 ขึ้นไป
