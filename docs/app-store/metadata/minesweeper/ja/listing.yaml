name: "マインスイーパ — クラシック"
subtitle: "iPhoneとMacの静かな論理"
promotional_text: |
  おなじみの論理ゲームを、静かに。初級・中級・上級の3段階。最初のタップは必ず安全。任意のバナー広告以外は追跡なし——1回の購入で広告を完全に消せます。
description: |
  マインスイーパを、思考のために。雑音のためではなく。

  ルールはご存じのとおり。マスを開き、数字を読み、地雷に旗を立て、地雷を踏まずに盤面を空にする。クラシックな3段階——初級（9×9、地雷10）、中級（16×16、地雷40）、上級（16×30、地雷99）。

  最初のタップは必ず安全

  地雷は最初にマスを開いたあとに配置されるので、開始の1手目とその周囲が地雷になることはない。初手で負けることはもうない。盤面は難易度とシードで完全に決まり、同じ盤を再プレイすれば同じ展開になる。

  内容

  • クラシックな3段階：初級・中級・上級。
  • 初手の安全：最初のタップで負けない。
  • タップで開く、長押しで旗（Macでは右クリックまたはcontrolクリック）。
  • 毎日戻れる盤面のセット。
  • いつでも再開：自動保存。

  真のクロスプラットフォーム

  ひとつのコードベース、ふたつのプラットフォーム。Mac版は本物のSwiftUI Macアプリ——iPad-on-MacでもCatalystでもない。ウィンドウのリサイズも右クリックでの旗立ても、Macの作法どおりに動く。手元にあるデバイスで続きをプレイできる。

  プライバシーについて

  自社のアナリティクスもCRMもバックエンドもない。データは自分のiCloudプライベートデータベースにある——見えるのは本人だけ。サードパーティのSDKはGoogleのバナー広告ライブラリのみで、1回のアプリ内課金でバナーを完全に削除できる。

  広告を非表示

  非消耗型の1回購入で、すべてのバナーを永久に削除。ファミリー共有対応。

  7言語対応

  日本語、英語、繁体字中国語、簡体字中国語、スペイン語、タイ語、韓国語。

  アクセシビリティ

  Dynamic Type、VoiceOver、ライト／ダークモード対応。

  iOS 26またはmacOS 26以降が必要。
