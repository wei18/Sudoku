# ── App Review notes ──────────────────────────────────────────────────────
# Visible to App Review team only. English convention; describe how to
# trigger the purchase + what the reviewer should observe.
review_notes: |
  This is a non-consumable IAP that permanently removes banner ads in
  the Sudoku app.

  How to test:
  1. Launch the app. A banner ad placeholder appears at the bottom of
     the Home screen and inside Daily / Practice flows.
  2. Tap the "Remove Ads" row on the Home screen (the 5th item, below
     Settings) OR open Settings → Remove Ads row.
  3. Confirm the StoreKit purchase sheet with a sandbox tester account.
  4. After successful purchase, the banner ad disappears across all
     screens. The "Remove Ads" row hides; a "Restore Purchases" row
     remains in Settings for users restoring on a new device.

  Edge cases handled:
  - Purchase deferred / Ask to Buy: app shows "in-flight" indicator,
    completes when Apple resolves the transaction.
  - Restore on a new device: tap "Restore Purchases" in Settings;
    the entitlement is re-applied automatically.
  - Refund / family-share revocation: entitlement is removed and ads
    return on the next app launch.

  No external services other than Apple's StoreKit are involved in the
  IAP flow.

# ── Pricing schedule ─────────────────────────────────────────────────────
# ASC requires explicit price tier selection. Tier may shift with Apple
# price tier reforms; canonical value is what's saved in ASC.
pricing:
  tier: "USD 2.99"
  family_sharing: true
  cleared_for_sale: true
  all_countries: true

