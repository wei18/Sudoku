  en-US:
    name: "Remove Ads"
    description: "Permanently remove banner ads in Minesweeper."

  zh-Hant:
    name: "移除廣告"
    description: "永久移除踩地雷中的橫幅廣告。"

  ja:
    name: "広告を非表示"
    description: "マインスイーパのバナー広告を完全に非表示にします。"

  zh-Hans:
    name: "移除广告"
    description: "永久移除扫雷中的横幅广告。"

  es-ES:
    name: "Quitar anuncios"
    description: "Quita los banners de Buscaminas para siempre."

  th:
