whats_new: |
  v1.0 — 첫 공개 출시예요.

  • Daily 모드: 매일 UTC 00:00에 새 퍼즐 세 개. 난이도별로 독립된 데일리 리더보드.
  • Practice 모드: 난이도별 무작위 보드. 시계도 없고 점수도 없어요.
  • 기기 간 동기화: iPhone과 Mac의 저장 데이터와 통계가 당신의 iCloud Private Database를 통해 오가요.
  • Game Center: 데일리 리더보드 세 개와 도전 과제 여덟 개(합쳐서 500점).
  • 출시일부터 일곱 가지 언어: 번체 중국어, 영어, 일본어, 간체 중국어, 스페인어, 태국어, 한국어.
  • Mac 네이티브 빌드. Catalyst가 아니에요 — 키보드 지원과 메뉴 막대를 갖췄어요.
  • 광고 없음, 추적 없음, 서드파티 SDK 없음.

  플레이해 줘서 고마워요. 문제와 의견은 지원 링크로 알려주세요.
