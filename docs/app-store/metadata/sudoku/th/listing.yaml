whats_new: |
  เวอร์ชัน 2.5

  ตรรกะเงียบๆ ตอนนี้เลือกแบบไม่มีโฆษณาก็ได้

  • ลบโฆษณา — การซื้อครั้งเดียวแบบไม่สิ้นเปลือง ลบแบนเนอร์ทุกที่อย่างถาวร ไม่มีการสมัครสมาชิก ไม่มีการเรียกเก็บเงินซ้ำ
  • กู้คืนการซื้อ — ซื้อไว้แล้ว? กู้คืนสิทธิ์ "ลบโฆษณา" บนอุปกรณ์ใดก็ได้ของคุณในแตะเดียว
  • Family Sharing — ซื้อครั้งเดียวครอบคลุมทั้งกลุ่ม Family Sharing ของคุณ

  ความเป็นส่วนตัวยังคงเป็นอย่างที่ควรเป็น เราไม่มี analytics ของเราเอง ฝั่งเราจึงไม่สร้างโปรไฟล์ของคุณ ถ้าคุณเก็บแบนเนอร์ฟรีไว้ โฆษณาจะปรับให้ตรงกับคุณเฉพาะเมื่อคุณอนุญาต และคุณปฏิเสธได้ เมื่อลบโฆษณาแล้ว การใช้ตัวระบุโดยไลบรารีโฆษณาก็หยุดทั้งหมดเช่นกัน

  ขอบคุณที่เล่น แจ้งปัญหาหรือข้อเสนอแนะได้ที่ลิงก์สนับสนุน
