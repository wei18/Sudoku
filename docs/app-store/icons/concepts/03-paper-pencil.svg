<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Concept 03: Paper Pencil -->
  <!-- Faint 3x3 grid + sage pencil 45° from lower-left to upper-right -->
  <rect width="1024" height="1024" fill="#FAF8F3"/>
  <!-- Faint 3x3 grid (20% opacity) -->
  <g stroke="#5C7A4F" stroke-width="10" fill="none" opacity="0.2">
    <rect x="212" y="212" width="600" height="600"/>
    <line x1="412" y1="212" x2="412" y2="812"/>
    <line x1="612" y1="212" x2="612" y2="812"/>
    <line x1="212" y1="412" x2="812" y2="412"/>
    <line x1="212" y1="612" x2="812" y2="612"/>
  </g>
  <!-- Pencil rotated -45° (lower-left to upper-right), centered at (512,512) -->
  <!-- Pencil body: rectangle 560 long x 80 tall; tip is a triangle on +x end -->
  <!-- Tip touches center cell area; geometry: body x=-280..220, tip x=220..280 -->
  <g transform="translate(512 512) rotate(-45)">
    <!-- Eraser end (warm dark sage tone, use solid sage) -->
    <rect x="-280" y="-40" width="60" height="80" fill="#5C7A4F"/>
    <!-- Pencil body -->
    <rect x="-220" y="-40" width="420" height="80" fill="#5C7A4F"/>
    <!-- Pencil tip (triangle) -->
    <polygon points="200,-40 280,0 200,40" fill="#5C7A4F"/>
  </g>
</svg>
