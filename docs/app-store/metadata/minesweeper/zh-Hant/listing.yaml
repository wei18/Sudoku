  首次發布。

  • 經典踩地雷：初級、中級、專家。第一下永遠安全。
  • Daily 模式：每天 UTC 00:00 三題，附 Game Center 排行榜。
  • 移除廣告：一次性、非消耗型內購，永久移除橫幅。含家庭共享。
