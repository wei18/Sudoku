whats_new: |
  버전 2.6

  데일리 퍼즐, 리더보드, 도전 과제 — 그리고 더 조용하게.

  • Daily 모드 — 매일 UTC 00:00에 새 퍼즐 세 개(쉬움/보통/어려움), 전 세계 동일.
  • Game Center — 데일리 리더보드 세 개와 도전 과제 여덟 개, 합쳐서 500점. 로그인 선택.
  • 언제든 이어 하기 — 자동 저장, 홈 화면에서 한 번 탭으로 이어요.
  • 광고 제거 — 비소모성 일회성 구매로 배너를 영구히 없애요. 가족 공유 지원.

  개인정보는 마땅히 그래야 할 모습 그대로예요. 자체 분석 없고, 광고는 허락할 때만 맞춤화 — 거부할 수도 있어요.

  플레이해 줘서 고마워요. 문제와 의견은 지원 링크로 알려주세요.
