  <!-- Center positions for dots: columns/rows at 232, 452, 672 -->
  <rect width="1024" height="1024" fill="#FAF8F3"/>
  <g fill="#5C7A4F">
    <circle cx="282" cy="282" r="70"/>
    <circle cx="512" cy="282" r="70"/>
    <circle cx="742" cy="282" r="70"/>
    <circle cx="282" cy="512" r="70"/>
    <circle cx="512" cy="512" r="70"/>
    <circle cx="742" cy="512" r="70"/>
    <circle cx="282" cy="742" r="70"/>
    <circle cx="512" cy="742" r="70"/>
    <circle cx="742" cy="742" r="70"/>
  </g>
</svg>
