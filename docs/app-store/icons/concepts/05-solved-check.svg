<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Concept 05: Solved Check -->
  <!-- Faint 9x9 grid background + central sage checkmark -->
  <rect width="1024" height="1024" fill="#FAF8F3"/>
  <!-- Faint 9x9 grid (15% opacity); 720x720 centered -->
  <!-- Outer at x=152..872, y=152..872; cells = 80pt -->
  <g stroke="#5C7A4F" fill="none" opacity="0.15">
    <!-- Thin internal lines -->
    <g stroke-width="4">
      <line x1="232" y1="152" x2="232" y2="872"/>
      <line x1="312" y1="152" x2="312" y2="872"/>
      <line x1="472" y1="152" x2="472" y2="872"/>
      <line x1="552" y1="152" x2="552" y2="872"/>
      <line x1="712" y1="152" x2="712" y2="872"/>
      <line x1="792" y1="152" x2="792" y2="872"/>
      <line x1="152" y1="232" x2="872" y2="232"/>
      <line x1="152" y1="312" x2="872" y2="312"/>
      <line x1="152" y1="472" x2="872" y2="472"/>
      <line x1="152" y1="552" x2="872" y2="552"/>
      <line x1="152" y1="712" x2="872" y2="712"/>
      <line x1="152" y1="792" x2="872" y2="792"/>
    </g>
    <!-- Thick 3x3 block boundaries -->
    <g stroke-width="8">
      <rect x="152" y="152" width="720" height="720"/>
      <line x1="392" y1="152" x2="392" y2="872"/>
      <line x1="632" y1="152" x2="632" y2="872"/>
      <line x1="152" y1="392" x2="872" y2="392"/>
      <line x1="152" y1="632" x2="872" y2="632"/>
    </g>
  </g>
  <!-- Central sage checkmark: stroke 60, rounded caps -->
  <polyline points="300,540 460,700 740,360"
            fill="none"
            stroke="#5C7A4F"
            stroke-width="60"
            stroke-linecap="round"
            stroke-linejoin="round"/>
</svg>
