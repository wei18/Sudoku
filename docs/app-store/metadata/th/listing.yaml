  • โหมด Practice: กระดานสุ่มตามระดับ ไม่มีจับเวลา ไม่มีอันดับ
  • ซิงค์ข้ามอุปกรณ์: เซฟและสถิติเดินทางระหว่าง iPhone กับ Mac ผ่าน iCloud Private Database ของคุณ
  • Game Center: กระดานอันดับรายวันสามรายการ ความสำเร็จแปดอย่าง (รวม 500 คะแนน)
  • รองรับเจ็ดภาษา: จีนตัวเต็ม อังกฤษ ญี่ปุ่น จีนตัวย่อ สเปน ไทย เกาหลี
  • Mac build แบบเนทีฟ ไม่ใช่ Catalyst รองรับคีย์บอร์ดเต็มที่และเมนูบาร์
  • ไม่ติดตาม มีเพียงแบนเนอร์ที่เลือกได้ ลบออกถาวรด้วยการซื้อ "ลบโฆษณา" ครั้งเดียว

  ขอบคุณที่เล่น แจ้งปัญหาหรือข้อเสนอแนะได้ที่ลิงก์สนับสนุน
