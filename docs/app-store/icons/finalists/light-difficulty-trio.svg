<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Concept 07: Filled Difficulty Trio -->
  <!-- Warm paper bg; three cells filled sage/clay/amber matching Easy/Medium/Hard; flat (no skeuomorphic shadow) -->
  <!-- NO rounded-corner clip (2026-06-01 user direction): Apple's compositor
       applies the squircle mask at render time. Baking corners into the SVG
       caused PNG corners to be transparent (RGBA with alpha at the corners),
       producing a double-mask look in Xcode 26's icon preview. Background
       fills the full 1024×1024 canvas; let Apple handle the corners. -->
  <g>
    <rect width="1024" height="1024" fill="#FAF8F3"/>
    <!-- Filled diagonal trio: top-left sage (Easy), center clay (Medium), bottom-right amber (Hard) -->
    <rect x="212" y="212" width="200" height="200" fill="#5C7A4F"/>
    <rect x="412" y="412" width="200" height="200" fill="#C97D5F"/>
    <rect x="612" y="612" width="200" height="200" fill="#E6A857"/>
    <!-- Sage grid (S3-B: stroke-width 12 -> 16 for 60px legibility) -->
    <g stroke="#2E5135" stroke-width="16" fill="none" stroke-linecap="square">
      <rect x="212" y="212" width="600" height="600"/>
      <line x1="412" y1="212" x2="412" y2="812"/>
      <line x1="612" y1="212" x2="612" y2="812"/>
      <line x1="212" y1="412" x2="812" y2="412"/>
      <line x1="212" y1="612" x2="812" y2="612"/>
    </g>
  </g>
</svg>
