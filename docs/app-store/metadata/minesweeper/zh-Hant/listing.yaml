name: "踩地雷 — 經典"
subtitle: "iPhone 與 Mac 的乾淨邏輯"
promotional_text: |
  經典邏輯遊戲，安靜的版本。初級、中級、專家三種難度。第一下永遠安全。除了可選的橫幅廣告外不做追蹤——一次購買即可永久移除。
description: |
  踩地雷，留給思考，不留給雜訊。

  規則你早就會：翻開格子、看數字、標記地雷，在不踩到雷的前提下把整個盤面清空。三種經典難度——初級（9×9，10 顆雷）、中級（16×16，40 顆雷）、專家（16×30，99 顆雷）。

  第一下永遠安全

  地雷在你第一次翻格之後才放置，所以你開局的第一下、以及周圍的格子，絕對不會是雷。不會再開局就爆。每個盤面由難度與 seed 完全決定，同一盤重玩走法一致。

  內容

  • 三種經典難度：初級、中級、專家。
  • 第一下安全：開局那下不會爆。
  • 點一下翻開，長按標記（Mac 上用右鍵或 control 點擊）。
  • 每天一組可回來玩的盤面。
  • 隨時接續：自動存檔。

  真正的跨平台

  一份程式碼，兩個平台。Mac 版本是貨真價實的 SwiftUI Mac App——不是 iPad-on-Mac、也不是 Catalyst。視窗縮放、右鍵標記，都照 Mac 使用者的習慣走。手邊哪台裝置在線，就在那台接著玩。

  關於隱私

  不做第一方 analytics、沒有 CRM、沒有自己的後端。你的資料放在你自己的 iCloud Private Database——你看得到，我們看不到。唯一的第三方 SDK 是 Google 的橫幅廣告函式庫，而你可以用一次內購把橫幅永久移除。

  移除廣告

  一次性、非消耗型內購，永久移除所有橫幅。含家庭共享。

  七種語言

  繁體中文、英文、日文、簡體中文、西班牙文、泰文、韓文。

  無障礙

  支援 Dynamic Type、VoiceOver、亮暗模式。

  需要 iOS 26 或 macOS 26 以上。
