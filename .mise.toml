# mise tool versions — shared between dev machines and Xcode Cloud CI.
# Backend selection: `aqua:` first (verified registry entries), `ubi:` fallback
# for tools without aqua coverage. Verify with `mise plugin list --all`.
#
# Notes:
# - `swift` is provided by Xcode / Xcode Cloud toolchain; not managed here.
# - `lefthook` + `gitleaks` are not in mise core; both have aqua registry entries
#   (`evilmartians/lefthook`, `gitleaks/gitleaks`). If `aqua:` resolution fails
#   on a given machine, swap to `ubi:` (same owner/repo).
# - SwiftLint / SwiftFormat / xcbeautify have aqua entries under realm/<repo>.

[tools]
swiftlint                       = "0.57"
xcbeautify                      = "2"
"aqua:gitleaks/gitleaks"        = "8.30.1"   # foundations.md §7.5 requires ≥ 8.18
"aqua:evilmartians/lefthook"    = "1"
"aqua:tuist/tuist"              = "4"        # generates App/Sudoku.xcodeproj from Project.swift (Phase 1.4)

# LicensePlist — generates Settings.bundle/Acknowledgements page from the
# SwiftPM dep graph (per `license_plist.yml`). Invoked from Xcode Cloud
# `ci_scripts/ci_post_clone.sh` (see docs/foundations.md §4). Generated
# Settings.bundle is .gitignore'd; `license_plist.yml` is the source of truth.
#
# `exe = "license-plist"` override: tarball binary is `license-plist`
# (lowercase + hyphen), repo is `LicensePlist`. Without override, ubi looks
# for `LicensePlist*` inside the tarball and fails to install.
"ubi:mono0926/LicensePlist"     = { version = "3.27.9", exe = "license-plist" }

# ─────────────────────────────────────────────────────────────────────────────
# Tasks — single source of truth for tool invocations shared by lefthook,
# GitHub Actions, and Xcode Cloud. Edit flags here; all consumers re-route
# through `mise run <task>`. See docs/foundations.md §4 and §7.5.
# ─────────────────────────────────────────────────────────────────────────────

[tasks."lint:swift"]
description = "SwiftLint (warn-only; used by lefthook pre-commit). Pass changed files as args."
run = "mise exec swiftlint -- swiftlint lint --quiet"

[tasks."lint:swift:strict"]
description = "SwiftLint (warnings fail; used by GitHub Actions PR CI). Pass changed files as args."
run = "mise exec swiftlint -- swiftlint lint --strict --quiet"

[tasks."scan:secrets"]
description = "gitleaks pre-commit / pre-build secret scan over staged files."
run = "mise exec aqua:gitleaks/gitleaks -- gitleaks git --pre-commit --staged --redact --verbose"

[tasks."scan:hygiene"]
description = "Repo hygiene: block secret-shaped files (.p8/.p12/.pem/.env) from ever entering history."
run = """
if git ls-files | grep -E '\\.(p8|p12|pem|env)$'; then
  echo "Secret-shaped files tracked. Aborting." >&2
  exit 1
fi
"""

[tasks."gen:acknowledgements"]
description = "Generate Settings.bundle/Acknowledgements page from SwiftPM dep graph (license_plist.yml)."
run = "mise exec ubi:mono0926/LicensePlist -- license-plist"
