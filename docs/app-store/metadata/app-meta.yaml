# App-level (non-localized) App Store Connect metadata — Sudoku.
#
# These fields are GLOBAL per app, not per locale, so they live here once
# instead of being duplicated across the seven <locale>/listing.yaml files.
# See ../README.md "App-level metadata" for the shape decision. Field names
# are snake_case to match the ASC API JSON keys (and Fastlane `deliver`).
#
# Sources of truth:
#   - copyright holder ............ repo LICENSE ("Copyright (c) 2026 Wei18")
#   - categories ................... README "Locked decisions (2026-05-20)"
#   - review_information.notes ..... docs/app-store/review/sudoku-v2.5.md
#
# Values flagged "# FLAG:" below are placeholders awaiting user confirmation
# (the real values are PII / account-private and must not be hardcoded here).

app: sudoku
bundle_id: com.wei18.sudoku
apple_id: "6772925351"

# --- Categories (ASC App Information) -------------------------------------
# ASC takes a primary + optional secondary category, each with up to two
# sub-categories. Sudoku is a Game; sub-categories refine the Games genre.
primary_category: "Games"
primary_first_sub_category: "Puzzle"
primary_second_sub_category: "Board"
secondary_category: "Games"
secondary_first_sub_category: "Family"
secondary_second_sub_category: null

# --- Copyright (ASC App Information) --------------------------------------
# ASC convention: "<year> <legal holder name>" (no leading © — ASC adds it).
copyright: "2026 Wei18"

# --- Review information (ASC App Review, per submission) ------------------
# Contact details Apple's reviewer uses if they need to reach the developer.
# No demo account: the app needs no login (see review notes doc).
review_information:
  first_name: "Wei18"       # git user.name (single handle)
  last_name: "Wei18"        # ASC needs both fields; single handle => same value
  email_address: "11254896+wei18@users.noreply.github.com"  # FLAG: GitHub noreply does NOT receive mail — replace with a monitored inbox before submission (Apple emails the review contact)
  phone_number: null  # secret — ASC review contact held in secrets/.env, injected at apply time (never committed)
  demo_user: null            # N/A — no login required
  demo_password: null        # N/A — no login required
  # Notes pasted into ASC "Review Information → Notes". The canonical, full
  # text is the fenced block in docs/app-store/review/sudoku-v2.5.md — paste
  # THAT verbatim at submission; this summary just points the uploader to it.
  notes_source: "docs/app-store/review/sudoku-v2.5.md"
  notes_summary: |
    No account or login required; app runs fully on first launch. One IAP
    (com.wei18.sudoku.iap.remove_ads, non-consumable, removes banner ads) —
    sandbox test steps in the source doc. Daily puzzles rotate at 00:00 UTC
    (intentional; keeps the global leaderboard fair). Three Game Center daily
    leaderboards + eight achievements (optional sign-in). UMP + ATT consent on
    first launch; declining is fully supported. CloudKit Private Database only,
    no app-owned backend. Only third-party SDK is Google Mobile Ads (banner).
    Paste the full Notes block from the source doc verbatim at submission.
