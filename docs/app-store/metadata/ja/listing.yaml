whats_new: |
  バージョン2.5

  数独は引き続き無料。今回は任意のバナー広告と、それをオフにする方法を追加。

  • 広告を非表示：1回の購入ですべてのバナーを永久に削除。ファミリー共有対応。
  • 購入を復元：すでに購入済みなら、どのデバイスでも1タップで復元。
  • 無料版のままなら、広告は非パーソナライズ。追跡なし、プライバシーは変わらない。
  • デイリーリーダーボード、iCloudによるセーブと記録の同期は従来どおり。

  遊んでくれてありがとう。問題や要望はサポートリンクから。
