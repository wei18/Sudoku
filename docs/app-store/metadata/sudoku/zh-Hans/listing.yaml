whats_new: |
  版本 2.6

  每日挑战、排行榜、成就——以及比以前更安静。

  • Daily 模式 —— 每天 UTC 00:00 三道新题（简单／中等／困难），全球玩家同题。
  • Game Center —— 三条每日排行榜与八个成就，共 500 点。登录可选。
  • 随时接续 —— 自动存档，首页一键继续。
  • 移除广告 —— 一次性、非消耗型内购，永久移除横幅。含家庭共享。

  隐私维持它该有的样子：不做第一方 analytics，广告只在你同意下才会贴近你——也可以拒绝，或一次购买移除。

  谢谢游玩。问题与建议欢迎到支持链接反馈。
