# Consolidated lint workflow — 3 jobs:
#   1. pr-metadata   — Conventional Commits PR title (ubuntu, no source)
#   2. docs-link-check — lychee scan of docs/ + meetings/ (ubuntu, no source)
#   3. swift-lint    — swiftlint + swiftformat on changed Swift files (macos)
#
# Workflow-level path filter is omitted so the workflow always runs and each
# job's own `if:` (or path-aware logic) decides whether to do work; this keeps
# the required-status-check setup simple — one workflow name, three job
# names — once branch protection lands (user-owned).

name: Lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-metadata:
    name: Validate PR title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Conventional Commits types accepted in this repo (matches recent
          # merged commit history: feat, refactor, fix, docs, chore, ci, ...).
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            build
            ci
            perf
            style
            revert
          # Scopes optional + unrestricted (e.g. `feat(monetization):`).
          requireScope: false
          # Subject lowercase, per recent commit style.
          subjectPattern: ^[a-z].+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Subject should start with a
            lowercase letter (e.g. "feat(scope): add foo bar").

  docs-link-check:
    name: Markdown link check (lychee)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: List changed markdown files via gh api
        id: changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          files=$(gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate \
            --jq '.[] | select(.filename | startswith("docs/") or startswith("meetings/")) | select(.filename | endswith(".md")) | .filename' \
            | tr '\n' ' ')
          echo "files=$files" >> "$GITHUB_OUTPUT"
          if [ -z "$files" ]; then
            echo "No relevant markdown files changed; lychee will be skipped."
          else
            echo "Changed markdown files: $files"
          fi

      - name: Check markdown links
        if: steps.changed.outputs.files != ''
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 4
            ${{ steps.changed.outputs.files }}
          fail: true
          # A markdown change with zero links is not a failure mode — lychee's
          # default failIfEmpty=true blocks legit no-link doc edits (e.g.
          # docs/methodology.md contains no URLs). Only real broken links
          # should fail the job; absence of links should not.
          failIfEmpty: false

  swift-lint:
    name: SwiftLint (changed files)
    # ubuntu-latest: swiftlint ships a linux x86_64 binary via mise (no Swift
    # toolchain needed for lint-only). swiftformat removed 2026-05-26 (user
    # decision: swiftlint coverage sufficient; swiftformat is redundant).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise + pinned tools
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: List changed Swift files via gh api
        id: changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          files=$(gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate \
            --jq '.[] | select(.filename | endswith(".swift")) | .filename' \
            | tr '\n' ' ')
          echo "files=$files" >> "$GITHUB_OUTPUT"
          if [ -z "$files" ]; then
            echo "No Swift files changed; swift-lint will be skipped."
          else
            echo "Changed Swift files: $files"
          fi

      - name: SwiftLint on changed files
        if: steps.changed.outputs.files != ''
        # Invocation routes through `mise run lint:swift_strict` — SSOT task
        # body in .mise.toml. Strict variant fails on warnings (vs lefthook's
        # warn-only `lint:swift`).
        run: |
          set -euo pipefail
          # shellcheck disable=SC2086
          mise run lint:swift_strict -- ${{ steps.changed.outputs.files }}

  l10n:
    name: L10n catalogs complete (no <TRANSLATE>, all 7 locales)
    # Guards both shipping catalogs (Sudoku + Minesweeper) and the
    # AppCompositionTests fixture sync. Reads the real source tree, so it
    # catches placeholders the Xcode Cloud distributed test runner can't.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise + pinned tools
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Run L10n completeness gate
        run: mise run scan:l10n
