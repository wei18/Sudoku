name: "扫雷 — 经典"
subtitle: "iPhone 与 Mac 的干净逻辑"
promotional_text: |
  经典逻辑游戏，安静的版本。初级、中级、专家三种难度。第一下永远安全。除了可选的横幅广告外不做追踪——一次购买即可永久移除。
description: |
  扫雷，留给思考，不留给杂讯。

  规则你早就会：翻开格子、看数字、标记地雷，在不踩到雷的前提下把整个盘面清空。三种经典难度——初级（9×9，10 颗雷）、中级（16×16，40 颗雷）、专家（16×30，99 颗雷）。

  第一下永远安全

  地雷在你第一次翻格之后才放置，所以你开局的第一下、以及周围的格子，绝对不会是雷。不会再开局就爆。每个盘面由难度与 seed 完全决定，同一盘重玩走法一致。

  内容

  • 三种经典难度：初级、中级、专家。
  • 第一下安全：开局那下不会爆。
  • 点一下翻开，长按标记（Mac 上用右键或 control 点击）。
  • 每天一组可回来玩的盘面。
  • 随时接续：自动存档。

  真正的跨平台

  一份代码，两个平台。Mac 版本是货真价实的 SwiftUI Mac App——不是 iPad-on-Mac、也不是 Catalyst。窗口缩放、右键标记，都照 Mac 用户的习惯走。手边哪台设备在线，就在那台接着玩。

  关于隐私

  不做第一方 analytics、没有 CRM、没有自己的后端。你的数据放在你自己的 iCloud Private Database——你看得到，我们看不到。唯一的第三方 SDK 是 Google 的横幅广告库，而你可以用一次内购把横幅永久移除。

  移除广告

  一次性、非消耗型内购，永久移除所有横幅。含家庭共享。

  七种语言

  繁体中文、英文、日文、简体中文、西班牙文、泰文、韩文。

  无障碍

  支持 Dynamic Type、VoiceOver、亮暗模式。

  需要 iOS 26 或 macOS 26 以上。
