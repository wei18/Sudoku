promotional_text: |
  The classic logic game, made calm. Beginner, Intermediate, Expert. The first tap is always safe. No tracking beyond the optional banner — remove it with one purchase.
description: |
  Minesweeper, made for thinking — not for noise.

  The rules you already know: reveal cells, read the numbers, flag the mines, and clear the board without setting one off. Three classic difficulties — Beginner (9×9, 10 mines), Intermediate (16×16, 40 mines), and Expert (16×30, 99 mines).

  The first tap is always safe

  Mines are placed after your first reveal, so your opening tap — and the cells around it — can never be a mine. No more losing on move one. Every board is fully determined by its difficulty and seed, so a board plays out the same way each time you replay it.

  What's inside

  • Three classic difficulties — Beginner, Intermediate, Expert.
  • First-click safety — the opening tap can never lose.
  • Tap to reveal, long-press to flag (right-click or control-click on Mac).
  • A daily set of boards to return to.
  • Resume any time — saves are automatic.

  Truly cross-platform

  One codebase, two platforms. The Mac version is a real SwiftUI Mac app — not iPad-on-Mac, not Catalyst. Window resizing and right-click flagging work the way Mac users expect. Pick up where you left off on whichever device is near.

  Privacy, in plain words

  No first-party analytics. No CRM. No backend of our own. Your data lives in your own iCloud Private Database — visible to you, not to us. The only third-party SDK is Google's banner-ad library, and you can remove the banner permanently with a single in-app purchase.

  Remove Ads

  A one-time, non-consumable purchase removes the banner everywhere, forever. Family Sharing included.

  Seven languages

  English, Traditional Chinese, Japanese, Simplified Chinese, Spanish, Thai, and Korean.

  Accessibility

  Dynamic Type, VoiceOver, light and dark mode.

  Requires iOS 26 or macOS 26.
